<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>粉藍漸變花盆</title>

    <style>
        body {
            margin: 0;
            font-family: "Microsoft JhengHei", sans-serif;
            background: linear-gradient(135deg, #F772A4, #00918B);
            color: #333;
        }

        .container {
            max-width: 600px;
            margin: 100px auto;
            padding: 40px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            text-align: center;
        }

        h1 {
            margin-bottom: 20px;
            font-size: 35px;
            background: linear-gradient(90deg, #F772A4, #00918B);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            line-height: 1.8;
            margin: 12px 0;
            font-size: 16px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🎉 恭喜你找到了特殊花盆 🎉</h1>

        <p>你喜歡的話，就把它帶走吧 :></p>

        <p>
            如果你是畢業生，祝你 <b>畢業快樂、鵬程萬里</b>；<br>
            如果你是在校生，祝你 <b>考試全過</b>！
        </p>

        <p>最後祝你人生更加精彩，生活更加美好✨</p>
    </div>
</body>
</html>
