<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>普通花盆首頁</title>

  <style>
    body {
      margin: 0;
      font-family: "Noto Sans TC", sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      max-width: 600px;
      padding: 20px;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 10px;
    }

    p {
      font-size: 18px;
      line-height: 1.6;
      color: #cbd5e1;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 20px;
      background: #38bdf8;
      color: #0f172a;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
    }

    .btn:hover {
      background: #0ea5e9;
    }

    .stats {
      margin-top: 30px;
      font-size: 14px;
      color: #94a3b8;
    }

    .stats span {
      color: #38bdf8;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>看我幹什麼</h1>
    <p>去尋找花盆吧！</p>

    <div class="stats">
      本站訪問量：<span id="busuanzi_value_site_uv">0</span> 次
    </div>
  </div>

  <script async src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>

</body>
</html>
